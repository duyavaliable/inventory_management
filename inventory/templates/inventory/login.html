{% extends 'inventory/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block head_extra %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'inventory/products_styles.css' %}">
{% endblock head_extra %}

{% block content %}
<div class="auth-background">
    <div class="auth-overlay">
        <div class="container">
            <div class="row">
                <div class="col-11 col-md-4 mx-auto">
                    <div class="auth-card">
                        <h1 class="auth-title">Đăng nhập</h1>
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}
                            <button class="btn btn-primary w-100" type="submit">Đăng nhập</button>
                        </form>
                        <div class="pt-3 text-center">
                            <small class="text-muted">Chưa có tài khoản? <a href="{% url 'signup' %}">Đăng ký</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
